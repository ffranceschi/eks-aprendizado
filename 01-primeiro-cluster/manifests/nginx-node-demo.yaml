apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-node-demo
  labels:
    app: nginx-node-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-node-demo
  template:
    metadata:
      labels:
        app: nginx-node-demo
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: nginx-node-demo
              topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat <<EOF > /usr/share/nginx/html/index.html
              <html>
                <body>
                  <h1>Ola do Kubernetes!</h1>
                  <p>Node (instancia EC2): $NODE_NAME</p>
                  <p>Pod: $POD_NAME</p>
                </body>
              </html>
              EOF
              nginx -g 'daemon off;'
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-node-demo
spec:
  selector:
    app: nginx-node-demo
  ports:
    - port: 80
      targetPort: 80
