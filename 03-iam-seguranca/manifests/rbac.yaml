apiVersion: v1
kind: Namespace
metadata:
  name: equipe-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: leitor-pods
  namespace: equipe-dev
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: leitor-pods-binding
  namespace: equipe-dev
subjects:
  - kind: User
    name: dev-fulano
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: leitor-pods
  apiGroup: rbac.authorization.k8s.io
