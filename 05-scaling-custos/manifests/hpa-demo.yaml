apiVersion: apps/v1
kind: Deployment
metadata:
  name: carga-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carga-cpu
  template:
    metadata:
      labels:
        app: carga-cpu
    spec:
      containers:
        - name: app
          image: vish/stress
          args: ["-cpus", "1"]
          resources:
            requests:
              cpu: 200m
            limits:
              cpu: 500m
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: carga-cpu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: carga-cpu
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
