# Config do eksctl para o cluster do módulo 05.
# Edite "region" abaixo se quiser usar outra região AWS.
#
# O node group abaixo é só de BOOTSTRAP (1 node pequeno) — depois de
# instalado, o Karpenter assume o provisionamento dos nodes de carga de
# trabalho (veja o README).
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: eks-aprendizado-05
  region: us-east-1
  # A versão do Kubernetes é escolhida pelo eksctl (fica sem "version:" de
  # propósito) para evitar fixar uma versão que saia do "standard support"
  # do EKS com o tempo — control plane em standard support custa ~US$0,10/h,
  # em "extended support" custa ~US$0,60/h. Se quiser fixar uma versão
  # específica, confira antes em
  # https://docs.aws.amazon.com/eks/latest/userguide/kubernetes-versions.html
  # que ela ainda está em standard support.

iam:
  withOIDC: true

managedNodeGroups:
  - name: ng-bootstrap
    instanceType: t3.small
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 20
    labels:
      modulo: 05-scaling-custos
      role: bootstrap
